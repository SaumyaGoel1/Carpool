# CI: lint (Ruby + JS), run Rails and frontend tests, build Docker images.
# Require all jobs to pass for PR merge (enable in repo Settings → Branches → branch protection).
name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint-ruby:
    name: Lint Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Lint Ruby
        run: bin/rubocop -f github

  lint-frontend:
    name: Lint JS/TS (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci 2>/dev/null || npm install
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  test-backend:
    name: Rails tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y build-essential git libpq-dev libyaml-dev pkg-config google-chrome-stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Rails tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
        run: bin/rails db:test:prepare test
      - name: System tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
        run: bin/rails test:system

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        working-directory: frontend
        run: (npm ci 2>/dev/null || npm install) && npm run test

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Rails image
        run: docker build -t app-app .
      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile --build-arg VITE_API_URL=https://api.example.com --target production -t app-frontend ./frontend

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    name: Security scan (Rails JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Audit JS dependencies (importmap)
        run: bin/importmap audit
